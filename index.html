<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RaceReady</title>

<link rel="stylesheet" href="./css/styles.css">
<script type="module" src="./js/main.js"></script>
</head>

<body>

<header>
<h1><a href="#races">RaceReady</a></h1>
<nav>
<button id="homeBtn">Races</button>
<button id="trainingBtn">Training Log</button>
</nav>
</header>

<main id="app">

<section id="raceListView"></section>

<section id="raceDetailsView" class="hidden"></section>

<section id="trainingView" class="hidden">
    <h2>Training Log</h2>

    <input id="date" type="date" aria-label="date of workout">
    <input id="miles" type="number" placeholder="Miles" aria-label="miles run">
<select id="type">
  <option>Run</option>
  <option>Ruck</option>
  <option>HIIT</option>
</select>

<button id="addWorkout">Add</button>

<ul id="workoutList"></ul>

<p id="totalMiles"></p>
</section>

</main>

<footer>
  <p>&copy; 2026 RaceReady. Train smart. Race strong.</p>
</footer>

</body>
</html>
